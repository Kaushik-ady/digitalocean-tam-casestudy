apiVersion: apps/v1
kind: Deployment
metadata:
  name: tam-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tam-app
  template:
    metadata:
      labels:
        app: tam-app
    spec:
      containers:
      - name: tam-app-container
        # CHANGE THIS TO YOUR DOCKER HUB USERNAME
        image: kaushikady/digitalocean-tam-app:v2
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: tam-app-service
spec:
  type: LoadBalancer
  selector:
    app: tam-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
